<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vider la base de données</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #1f2937;
      color: white;
    }
    .container {
      background: #374151;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    h1 { color: #ef4444; margin-top: 0; }
    .warning {
      background: #7c2d12;
      border: 2px solid #ef4444;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #4b5563;
      border-radius: 6px;
      font-size: 16px;
      background: #1f2937;
      color: white;
    }
    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-danger {
      background: #dc2626;
      color: white;
    }
    .btn-danger:hover {
      background: #b91c1c;
    }
    .btn-danger:disabled {
      background: #6b7280;
      cursor: not-allowed;
    }
    #status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
    }
    .success { background: #065f46; display: block; }
    .error { background: #7c2d12; display: block; }
    .info { background: #1e3a8a; display: block; }
    pre {
      background: #1f2937;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗑️ Vider la base de données</h1>

    <div class="warning">
      <strong>⚠️ ATTENTION!</strong>
      <p>Cette opération va supprimer <strong>TOUTES</strong> les données sauf les utilisateurs:</p>
      <ul>
        <li>Tous les colis</li>
        <li>Tous les clients</li>
        <li>Toutes les signatures</li>
        <li>Toutes les transactions</li>
        <li>Etc.</li>
      </ul>
      <p><strong>Cette action est IRRÉVERSIBLE!</strong></p>
    </div>

    <div id="loginForm">
      <input type="email" id="email" placeholder="Email admin" value="echchaaba0178@gmail.com">
      <input type="password" id="password" placeholder="Mot de passe">
      <button class="btn-danger" onclick="login()">Se connecter et vider</button>
    </div>

    <div id="status"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
    import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-functions.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA4bRe4N7ZeHalEIfv7SaT95m32o9ruPoM",
      authDomain: "arelanc.firebaseapp.com",
      projectId: "arelanc",
      storageBucket: "arelanc.firebasestorage.app",
      messagingSenderId: "1037931380099",
      appId: "1:1037931380099:web:123c2164cb867ea6ef8ab6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const functions = getFunctions(app);

    window.login = async function() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const statusEl = document.getElementById('status');
      const button = document.querySelector('button');

      if (!email || !password) {
        statusEl.className = 'error';
        statusEl.textContent = '❌ Veuillez remplir tous les champs';
        statusEl.style.display = 'block';
        return;
      }

      button.disabled = true;
      statusEl.className = 'info';
      statusEl.textContent = '🔐 Connexion en cours...';
      statusEl.style.display = 'block';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        statusEl.textContent = '✅ Connecté! Suppression en cours...';

        const clearDb = httpsCallable(functions, 'clearDatabase');
        const result = await clearDb();

        statusEl.className = 'success';
        statusEl.innerHTML = `
          <strong>✅ Suppression terminée!</strong>
          <p>📊 Total: ${result.data.totalDeleted} documents supprimés</p>
          <details>
            <summary>Détails par collection</summary>
            <pre>${JSON.stringify(result.data.results, null, 2)}</pre>
          </details>
        `;
      } catch (error) {
        statusEl.className = 'error';
        statusEl.innerHTML = `<strong>❌ Erreur:</strong> ${error.message}`;
        button.disabled = false;
      }
    };

    // Enter key support
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
